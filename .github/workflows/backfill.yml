name: Backfill Full History

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date for backfill (YYYY-MM-DD). Defaults to 2023-12-18."
        required: false
        default: "2023-12-18"
      form_types:
        description: "Which form types to backfill"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - 8K
          - 10K

permissions:
  contents: write

jobs:
  backfill:
    name: Full Historical Backfill
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours — full history can be large

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install datamule

      - name: Clear state files
        run: |
          rm -f stats/last_run_8k.txt stats/last_run_10k.txt
          echo "State cleared — full backfill from ${{ inputs.start_date }}"

      - name: Inject custom start date
        run: |
          # Write a temporary override so scripts pick up the custom start date
          mkdir -p stats
          if [ "${{ inputs.form_types }}" != "10K" ]; then
            # Set last_run to one day before start so scripts compute correct range
            python -c "
          from datetime import datetime, timedelta
          d = datetime.strptime('${{ inputs.start_date }}', '%Y-%m-%d') - timedelta(days=1)
          print(d.strftime('%Y-%m-%d'))
          " > stats/last_run_8k.txt
          fi
          if [ "${{ inputs.form_types }}" != "8K" ]; then
            python -c "
          from datetime import datetime, timedelta
          d = datetime.strptime('${{ inputs.start_date }}', '%Y-%m-%d') - timedelta(days=1)
          print(d.strftime('%Y-%m-%d'))
          " > stats/last_run_10k.txt
          fi

      - name: Fetch 8-K cybersecurity filings
        if: inputs.form_types == 'both' || inputs.form_types == '8K'
        env:
          DATAMULE_API_KEY: ${{ secrets.DATAMULE_API_KEY }}
        run: python .github/scripts/fetch_8k.py

      - name: Fetch 10-K cybersecurity disclosures
        if: inputs.form_types == 'both' || inputs.form_types == '10K'
        env:
          DATAMULE_API_KEY: ${{ secrets.DATAMULE_API_KEY }}
        run: python .github/scripts/fetch_10k.py

      - name: Build summary statistics
        run: python .github/scripts/build_stats.py

      - name: Clean up temp dirs
        run: rm -rf 8K/_tmp_8k 10K/_tmp_10k

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 8K/ 10K/ stats/
          if git diff --cached --quiet; then
            echo "Nothing new to commit after backfill"
          else
            COUNT=$(git diff --cached --name-only | grep "metadata.json" | wc -l)
            git commit -m "backfill: $COUNT filings from ${{ inputs.start_date }} [$(date -u '+%Y-%m-%d')]"
            git push
          fi
